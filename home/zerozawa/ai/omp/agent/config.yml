setupVersion: 1
memory:
  backend: hindsight
hindsight:
  scoping: per-project-tagged
  mentalModelAutoSeed: true
  autoRetain: false
  recallBudget: high
  recallMaxTokens: 4096
  recallContextTurns: 3
providers:
  webSearch: auto
modelRoles:
  tiny: litellm/deepseek-v4-flash:max
  slow: openai-codex/gpt-5.6-sol:max
  smol: openai-codex/gpt-5.6-luna:max
  default: openai-codex/gpt-5.6-terra:max
  vision: openai-codex/gpt-5.6-luna:medium
  plan: openai-codex/gpt-5.6-sol:max
  advisor: openai-codex/gpt-5.6-sol:max
  task: litellm/deepseek-v4-flash:max
  designer: openai-codex/gpt-5.6-sol:max
extensions:
  - /etc/nixos/home/zerozawa/ai/omp/agent/extensions/wakatime.ts
  - /etc/nixos/home/zerozawa/ai/omp/agent/extensions/commit-tool.ts
  - /etc/nixos/home/zerozawa/ai/omp/agent/extensions/safety-net.ts
  - /etc/nixos/home/zerozawa/ai/omp/agent/extensions/direnv.ts
  - /etc/nixos/home/zerozawa/ai/omp/agent/extensions/omp-pty.ts
task:
  enableLsp: true
  showResolvedModelBadge: true
  agentModelOverrides:
    architecture-analyzer: openai-codex/gpt-5.6-sol:max
    article-analyzer: openai-codex/gpt-5.6-luna:max
    assemble-reviewer: openai-codex/gpt-5.6-terra:max
    design-analyzer: openai-codex/gpt-5.6-sol:max
    domain-analyzer: openai-codex/gpt-5.6-sol:max
    file-analyzer: litellm/deepseek-v4-flash:max
    graph-reviewer: openai-codex/gpt-5.6-sol:max
    knowledge-graph-guide: openai-codex/gpt-5.6-terra:max
    project-scanner: litellm/deepseek-v4-flash:max
    tour-builder: openai-codex/gpt-5.6-sol:max
    designer: openai-codex/gpt-5.6-sol:max
    librarian: litellm/deepseek-v4-flash:max
    plan: openai-codex/gpt-5.6-sol:max
    reviewer: openai-codex/gpt-5.6-sol:max
    scout: litellm/deepseek-v4-flash:max
    sonic: litellm/deepseek-v4-flash:max
    task: openai-codex/gpt-5.6-luna:max
  eager: preferred
dev:
  autoqa:
    consent: denied
lsp:
  diagnosticsOnEdit: true
  formatOnWrite: true
  lazy: false
tools:
  discoveryMode: "off"
display:
  showTokenUsage: true
  cacheMissMarker: true
branchSummary:
  enabled: true
contextPromotion:
  enabled: true
read:
  toolResultPreview: true
github:
  enabled: true
  cache:
    enabled: true
    softTtlSec: 300
    hardTtlSec: 604800
defaultThinkingLevel: auto
advisor:
  enabled: false
  subagents: false
tier:
  advisor: none
provider:
  appendOnlyContext: "on"
colorBlindMode: true
statusLine:
  separator: powerline
  transparent: false
python:
  kernelMode: session
edit:
  mode: hashline
steeringMode: one-at-a-time
git:
  enabled: true
images:
  describeForTextModels: true
