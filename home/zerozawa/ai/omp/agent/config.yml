setupVersion: 1
memory:
  backend: hindsight
hindsight:
  scoping: per-project-tagged
  mentalModelAutoSeed: true
  recallBudget: high
  recallMaxTokens: 4096
  recallContextTurns: 3
providers:
  webSearch: auto
modelRoles:
  slow: openai-codex/gpt-5.5:xhigh
  vision: openai-codex/gpt-5.5:medium
  plan: openai-codex/gpt-5.5:xhigh
  default: litellm/deepseek-v4-pro:xhigh
  smol: litellm/deepseek-v4-flash:xhigh
  commit: litellm/deepseek-v4-flash:xhigh
  task: litellm/deepseek-v4-flash:xhigh
  designer: litellm/deepseek-v4-pro:xhigh
  tiny: litellm/deepseek-v4-flash
extensions:
  - /etc/nixos/home/zerozawa/ai/omp/agent/extensions/wakatime.ts
  - /etc/nixos/home/zerozawa/ai/omp/agent/extensions/commit-tool.ts
  - /etc/nixos/home/zerozawa/ai/omp/agent/extensions/safety-net.ts
  - /etc/nixos/home/zerozawa/ai/omp/agent/extensions/direnv.ts
  - /etc/nixos/home/zerozawa/ai/omp/agent/extensions/omp-pty.ts
task:
  enableLsp: true
  showResolvedModelBadge: true
  agentModelOverrides:
    architecture-analyzer: litellm/deepseek-v4-pro
    article-analyzer: litellm/deepseek-v4-flash
    assemble-reviewer: openai-codex/gpt-5.5
    domain-analyzer: litellm/deepseek-v4-pro
    file-analyzer: litellm/deepseek-v4-flash
    graph-reviewer: openai-codex/gpt-5.5
    knowledge-graph-guide: litellm/deepseek-v4-flash
    project-scanner: litellm/deepseek-v4-flash
    tour-builder: litellm/deepseek-v4-flash
    designer: litellm/deepseek-v4-pro
    explore: litellm/deepseek-v4-flash
    librarian: litellm/deepseek-v4-flash
    oracle: openai-codex/gpt-5.5
    plan: openai-codex/gpt-5.5
    quick_task: litellm/deepseek-v4-flash
    reviewer: openai-codex/gpt-5.5
    task: litellm/deepseek-v4-flash
  eager: preferred
dev:
  autoqa:
    consent: denied
lsp:
  diagnosticsOnEdit: true
  formatOnWrite: true
  lazy: false
tools:
  discoveryMode: "off"
display:
  showTokenUsage: true
  cacheMissMarker: true
branchSummary:
  enabled: true
contextPromotion:
  enabled: true
read:
  toolResultPreview: true
github:
  enabled: true
  cache:
    enabled: true
    softTtlSec: 300
    hardTtlSec: 604800
defaultThinkingLevel: auto
advisor:
  enabled: true
  subagents: false
tier:
  advisor: none
provider:
  appendOnlyContext: "on"
colorBlindMode: true
statusLine:
  separator: powerline
  transparent: false
python:
  kernelMode: session
edit:
  mode: apply_patch
steeringMode: one-at-a-time
git:
  enabled: true
images:
  describeForTextModels: true