setupVersion: 1
memory:
  backend: hindsight
hindsight:
  scoping: per-project-tagged
  mentalModelAutoSeed: true
  autoRetain: false
  recallBudget: high
  recallMaxTokens: 4096
  recallContextTurns: 3
providers:
  webSearch: auto
modelRoles:
  tiny: litellm/deepseek-v4-flash:max
  slow: kimi-code/k3:max
  smol: litellm/deepseek-v4-flash:max
  default: litellm/deepseek-v4-pro:max
  vision: kimi-code/kimi-k2.5:high
  plan: kimi-code/k3:max
  advisor: kimi-code/k3:max
  task: litellm/deepseek-v4-flash:max
  designer: kimi-code/k3:max
  commit: litellm/deepseek-v4-flash:max
extensions:
  - /etc/nixos/home/zerozawa/ai/omp/agent/extensions/wakatime.ts
  - /etc/nixos/home/zerozawa/ai/omp/agent/extensions/commit-tool.ts
  - /etc/nixos/home/zerozawa/ai/omp/agent/extensions/alarm-clock.ts
task:
  enableLsp: true
  showResolvedModelBadge: true
  agentModelOverrides:
    architecture-analyzer: kimi-code/k3:max
    article-analyzer: litellm/deepseek-v4-flash:max
    assemble-reviewer: litellm/deepseek-v4-flash:max
    design-analyzer: kimi-code/k3:max
    domain-analyzer: litellm/deepseek-v4-pro:max
    file-analyzer: litellm/deepseek-v4-flash:max
    graph-reviewer: litellm/deepseek-v4-pro:max
    knowledge-graph-guide: litellm/deepseek-v4-flash:max
    project-scanner: litellm/deepseek-v4-flash:max
    tour-builder: litellm/deepseek-v4-pro:max
    designer: kimi-code/k3:max
    librarian: litellm/deepseek-v4-flash:max
    plan: kimi-code/k3:max
    reviewer: litellm/deepseek-v4-pro:max
    scout: litellm/deepseek-v4-flash:max
    sonic: litellm/deepseek-v4-flash:max
    task: litellm/deepseek-v4-flash:max
  eager: preferred
dev:
  autoqaConsent: denied
lsp:
  diagnosticsOnEdit: true
  formatOnWrite: true
  lazy: false
display:
  showTokenUsage: true
  cacheMissMarker: true
branchSummary:
  enabled: true
contextPromotion:
  enabled: true
read:
  toolResultPreview: true
github:
  enabled: true
  cache:
    enabled: true
    softTtlSec: 300
    hardTtlSec: 604800
defaultThinkingLevel: auto
advisor:
  enabled: false
  subagents: false
tier:
  advisor: none
provider:
  appendOnlyContext: "on"
colorBlindMode: true
statusLine:
  separator: powerline
  transparent: false
python:
  kernelMode: session
edit:
  mode: replace
readLineNumbers: true
steeringMode: all
git:
  enabled: true
images:
  describeForTextModels: true
astGrep:
  enabled: true
inspect_image:
  enabled: true
checkpoint:
  enabled: true
mcp:
  notifications: true
autolearn:
  enabled: true
  autoContinue: true
disabledExtensions:
  []
shellMinimizer:
  sourceOutlineLevel: aggressive